<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
  <title>Not found · MTF Analytics</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%23059669'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='-apple-system,Inter,sans-serif' font-weight='800' font-size='36' text-anchor='middle' fill='white'%3EM%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fa; --fg: #0b1220; --muted: #5b6679; --card: #ffffff; --border: #e3e8ef;
      --primary: #2563eb; --bse: #059669;
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0b1020; --fg: #e6eaf2; --muted: #94a3b8; --card: #121831; --border: #283050; --primary: #60a5fa; --bse: #34d399; }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: grid; place-items: center; padding: 2rem;
    }
    .card {
      max-width: 480px; width: 100%;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.25rem 2rem;
      box-shadow: 0 12px 24px -10px rgb(15 23 42 / 0.18), 0 4px 8px -4px rgb(15 23 42 / 0.08);
      text-align: center;
    }
    .mark {
      width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--primary), var(--bse));
      display: grid; place-items: center;
      color: #fff; font-weight: 800; font-size: 1.5rem;
    }
    .code { font-size: .8rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; margin: 0 0 .5rem; }
    p { color: var(--muted); margin: 0 0 1.5rem; line-height: 1.5; }
    a.btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .65rem 1.2rem;
      background: var(--primary); color: #fff; text-decoration: none;
      border-radius: 8px; font-weight: 600; font-size: .92rem;
      transition: background-color .15s, transform .12s;
    }
    a.btn:hover { background: color-mix(in srgb, var(--primary) 88%, black); }
    a.btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">M</div>
    <div class="code">Error 404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved. Head back to the dashboard.</p>
    <a class="btn" href="/">Open MTF Analytics</a>
  </main>
</body>
</html>
