name: Refresh MTF data & deploy

# Triggers
#  - Scheduled: 22:22 IST Mon-Fri (16:52 UTC). Indian exchanges publish T+0
#    reports by ~19:00 IST. If either NSE's or BSE's report for today is
#    still missing when the run starts, the workflow retries up to 3 more
#    times with backoffs of 30 min, 1 h, and 2 h (then proceeds with
#    whatever has arrived — partial-day data is OK; the dashboard's
#    per-exchange "as of" stats already handle mismatched NSE/BSE dates).
#  - Manual via the "Run workflow" button. Manual runs default to a
#    single-attempt fetch (override via the `max_attempts` input).
on:
  schedule:
    - cron: "52 16 * * 1-5"   # 16:52 UTC = 22:22 IST, Mon-Fri
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days of BSE/NSE reports to fetch (default 7)"
        required: false
        default: "7"
        type: string
      skip_deploy:
        description: "Skip Cloudflare Pages deploy"
        required: false
        default: false
        type: boolean
      skip_commit:
        description: "Skip committing new files back to git"
        required: false
        default: false
        type: boolean
      max_attempts:
        description: "Fetch retries when today's report is missing (1 = no retry)"
        required: false
        default: "1"
        type: string

# Allow the workflow to push commits back to main.
permissions:
  contents: write

# Prevent two scheduled refreshes from racing each other (e.g. if the previous
# run is still extracting when the next cron fires).
concurrency:
  group: mtf-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    # Worst case: 1 fetch (~1 min) + sleep 30m + fetch + sleep 60m + fetch +
    # sleep 120m + fetch + extract/compress/deploy (~10 min) ≈ 224 min. Leave
    # comfortable headroom for slow runners / network hiccups.
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need full history so we can push back; shallow=1 also works for git
          # but we keep a slightly deeper clone in case anything later needs it.
          fetch-depth: 1
          # Use the default GITHUB_TOKEN's push permissions.
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      # 1) Pull any new BSE/NSE MTF reports — with retry-on-missing.
      #
      #    Weekend rule:
      #      - Manual workflow_dispatch on Sat/Sun in IST → SKIP fetch.
      #        No trading happens on weekends; nothing new to pull.
      #      - Scheduled cron (always Mon-Fri originally) that gets fired
      #        late by GitHub and lands with the runner showing Sat IST →
      #        PROCEED. This is the "Friday exception": cron is best
      #        effort and routinely runs 60-120 min late, so the Friday
      #        cron can bleed into Sat IST. EXPECTED resolves to the most
      #        recent weekday so the retry ladder targets Friday's reports.
      #
      #    mtf_downloader is idempotent (skips files that already exist and
      #    resolves BSE legacy/new format automatically). After each fetch
      #    we check whether the EXPECTED weekday's NSE and BSE reports
      #    landed on disk. If either is missing, sleep & retry per the
      #    backoff schedule (30 min, 1 h, 2 h). After the final attempt we
      #    proceed regardless — the dashboard's per-exchange last-available-
      #    row logic handles partial-day data correctly.
      #
      #    Scheduled runs use 4 attempts (1 + 3 retries). Manual dispatch
      #    defaults to 1 (override via the `max_attempts` input).
      - name: Fetch reports (with retry-on-missing)
        env:
          MAX_ATTEMPTS: ${{ github.event_name == 'schedule' && '4' || inputs.max_attempts || '1' }}
          LOOKBACK: ${{ inputs.lookback_days || '7' }}
        run: |
          set -e
          DOW=$(TZ=Asia/Kolkata date +%u)      # 1=Mon..7=Sun
          # Manual weekend dispatch → fetch ONCE, no retry ladder. Useful if
          # the Friday cron silently failed and you want to manually try
          # recovering Friday's data, but without burning 3.5 h of retries
          # on what's probably a market holiday. Scheduled runs are
          # untouched (cron is Mon-Fri; if it lands on Sat IST it's a
          # delayed Fri cron that needs the full retry ladder).
          if [ "$DOW" -gt 5 ] && [ "${{ github.event_name }}" != "schedule" ]; then
            echo "::notice::Saturday/Sunday manual dispatch in IST — single fetch attempt, no retries."
            MAX_ATTEMPTS=1
          fi

          # Backoff schedule (seconds): immediate, 30m, 1h, 2h.
          BACKOFFS=(0 1800 3600 7200)
          # Most recent weekday on or before "today in IST" — resolves to
          # Friday on a late-fire scheduled cron that lands on a Sat IST
          # runner. The retry ladder below targets THIS date.
          EXPECTED=$(TZ=Asia/Kolkata python3 -c "
          from datetime import datetime, timedelta
          d = datetime.now()
          while d.weekday() >= 5:
              d -= timedelta(days=1)
          print(d.strftime('%d%m%Y'))
          ")
          echo "Expected weekday for retry-check: $EXPECTED"
          NSE_PATH="mtf_reports/NSE/NSE_MTF_${EXPECTED}.zip"
          BSE_CSV="mtf_reports/BSE/BSE_MTF_${EXPECTED}.csv"
          BSE_XLS="mtf_reports/BSE/BSE_MTF_${EXPECTED}.xls"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            sleep_secs=${BACKOFFS[$((attempt-1))]}
            if [ "$sleep_secs" -gt 0 ]; then
              echo "::group::Sleeping ${sleep_secs}s before attempt $attempt"
              sleep "$sleep_secs"
              echo "::endgroup::"
            fi
            echo "=== Attempt $attempt of $MAX_ATTEMPTS — fetching reports ==="
            python mtf_downloader.py --last-days "$LOOKBACK" --exchange both --delay 2 || true

            missing=""
            [ -f "$NSE_PATH" ] || missing="$missing NSE"
            { [ -f "$BSE_CSV" ] || [ -f "$BSE_XLS" ]; } || missing="$missing BSE"
            if [ -z "$missing" ]; then
              echo "Both NSE and BSE reports for $EXPECTED present. Done."
              break
            fi
            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "::warning::Missing after $MAX_ATTEMPTS attempts:$missing — proceeding with whatever we have."
            else
              echo "Missing for $EXPECTED:$missing — will retry."
            fi
          done

      # 2) Daily totals: extract → sanitize → trim to 2017-06-22 cutoff.
      - name: Extract daily totals
        run: python extract_daily_totals_complete_fix.py

      - name: Sanitize daily totals (drop transient glitches)
        run: python sanitize_daily_totals.py --no-backup

      - name: Trim to dates >= 2017-06-22
        run: |
          python - <<'PY'
          import csv, json
          MIN = '2017-06-22'
          for f in [
              'mtf_daily_totals.json',
              'mtf_daily_totals_complete.json',
              'mtf_daily_totals_crores.json',
          ]:
              try:
                  with open(f, encoding='utf-8') as fp: rows = json.load(fp)
              except FileNotFoundError:
                  continue
              kept = [r for r in rows if (r.get('date') or '') >= MIN]
              with open(f, 'w', encoding='utf-8') as fp:
                  json.dump(kept, fp, indent=2)
              print(f'{f}: {len(rows)} -> {len(kept)} rows')

          for f in [
              'mtf_daily_totals.csv',
              'mtf_daily_totals_complete.csv',
              'mtf_daily_totals_crores.csv',
              'mtf_daily_totals_complete_crores.csv',
          ]:
              try:
                  with open(f, encoding='utf-8', newline='') as fp:
                      r = csv.DictReader(fp); fields = r.fieldnames
                      kept = [row for row in r if (row.get('date') or '') >= MIN]
              except FileNotFoundError:
                  continue
              with open(f, 'w', encoding='utf-8', newline='') as fp:
                  w = csv.DictWriter(fp, fieldnames=fields); w.writeheader(); w.writerows(kept)
              print(f'{f}: kept {len(kept)} rows')
          PY

      # 3) Stock-level extraction + compression.
      #    extract_stock_data.py also enforces the 2017-06-22 cutoff internally.
      #    stock_analytics.json is ~1.7 GB intermediate -- stays in the runner only.
      - name: Extract stock-level analytics
        run: python extract_stock_data.py

      - name: Compress stock data into gzipped chunks
        run: python compress_stock_data.py

      # 4) Sync the freshly-built data into the v4 deploy folder.
      #    mtf_dashboard_v4/compressed_data/ is gitignored (chunks rebuilt each
      #    run), so it doesn't exist on a fresh checkout — mkdir -p is required.
      - name: Sync data into mtf_dashboard_v4/
        run: |
          mkdir -p mtf_dashboard_v4/compressed_data
          cp -f mtf_daily_totals.json mtf_dashboard_v4/
          rm -f mtf_dashboard_v4/compressed_data/*.json.gz mtf_dashboard_v4/compressed_data/manifest.json
          cp -f compressed_data/manifest.json mtf_dashboard_v4/compressed_data/
          cp -f compressed_data/stock_analytics_base.json.gz mtf_dashboard_v4/compressed_data/
          cp -f compressed_data/stock_data_chunk_*.json.gz mtf_dashboard_v4/compressed_data/
          du -sh mtf_dashboard_v4/

      # 5) Deploy to Cloudflare Pages.
      - name: Deploy to Cloudflare Pages
        if: ${{ !inputs.skip_deploy }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy mtf_dashboard_v4 --project-name=mtf --commit-dirty=true

      # 6) Stage a job summary so the Actions tab shows what changed.
      - name: Job summary
        if: always()
        run: |
          {
            echo "## MTF refresh"
            echo ""
            python - <<'PY'
          import json, os
          try:
              d = json.load(open('mtf_daily_totals.json'))
              dates = sorted(set(r.get('date') for r in d if r.get('date')))
              print(f"- daily totals: **{len(d)}** rows, **{dates[0]} → {dates[-1]}**")
          except Exception as e:
              print(f"- daily totals: failed to read ({e})")
          try:
              size = os.path.getsize('mtf_dashboard_v4/compressed_data')
          except Exception: size = 0
          import glob
          gz = glob.glob('mtf_dashboard_v4/compressed_data/*.json.gz')
          total = sum(os.path.getsize(p) for p in gz)
          print(f"- stock chunks: **{len(gz)} files**, **{total/1024/1024:.1f} MB**")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

      # 7) Commit newly-fetched RAW reports back to git.
      #    Run last so a failure here doesn't block the deploy.
      #
      #    Only raw mtf_reports/ files are committed. Everything else this
      #    workflow produces (daily totals JSON/CSV, stock_analytics.json,
      #    compressed_data/*.json.gz, the v4 mirror copies of those files)
      #    is regenerated from scratch each run and uploaded direct to
      #    Cloudflare Pages by `wrangler pages deploy` in step 5 — committing
      #    them only bloats git history without any benefit.
      - name: Commit refreshed raw reports
        if: ${{ !inputs.skip_commit }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mtf_reports/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new raw reports — nothing to commit."
            exit 0
          fi

          STAMP="$(date -u +%Y-%m-%d)"
          git commit -m "data: refresh raw MTF reports through ${STAMP}

          Auto-generated by .github/workflows/refresh-and-deploy.yml.
          Only raw mtf_reports/ are committed; derived daily totals + stock
          chunks are generated in-runner and deployed direct to Cloudflare."

          git push
