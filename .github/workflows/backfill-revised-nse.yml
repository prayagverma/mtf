name: Backfill revised NSE reports

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only"
        required: false
        default: "false"
        type: string
      commit:
        description: "Commit improved zips back to main"
        required: false
        default: "true"
        type: string
      delay:
        description: "Seconds between NSE fetches"
        required: false
        default: "4"
        type: string
      dates:
        description: "Optional space-separated ISO dates"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: nse-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          DRY: ${{ inputs.dry_run }}
          DELAY: ${{ inputs.delay }}
          DATES: ${{ inputs.dates }}
        run: |
          set -e
          ARGS="--delay $DELAY"
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "$DATES" ]; then ARGS="$ARGS --dates $DATES"; fi
          echo "Running: python backfill_revised_nse.py $ARGS"
          python backfill_revised_nse.py $ARGS

      - name: Upload backfill report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-report
          path: |
            backfill_revised_nse_report.csv
            mtf_reports/NSE/_provisional_backup/

      - name: Commit improved zips
        if: ${{ inputs.commit == 'true' && inputs.dry_run != 'true' }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mtf_reports/NSE/NSE_MTF_*.zip backfill_revised_nse_report.csv || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: backfill revised NSE reports"
          git push origin main
